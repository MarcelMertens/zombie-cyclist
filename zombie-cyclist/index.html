<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Zombie Cyclist: Ride or Die</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #wrapper {
        position: relative;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
      }
      #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #fullscreenBtn {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #aaa;
        font: 12px/1 monospace;
        padding: 5px 9px;
        cursor: pointer;
        border-radius: 3px;
        opacity: 0.5;
        transition: opacity 0.15s, color 0.15s;
        z-index: 10;
        user-select: none;
      }
      #fullscreenBtn:hover { opacity: 1; color: #fff; }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <canvas id="gameCanvas"></canvas>
      <button id="fullscreenBtn" title="Vollbild [F]">&#x26F6; Vollbild</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
